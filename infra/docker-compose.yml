services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mrp
      POSTGRES_PASSWORD: mrp_dev
      POSTGRES_DB: mrp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data


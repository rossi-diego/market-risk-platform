name: Price update

on:
  schedule:
    - cron: "0 21 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "Override observation date (YYYY-MM-DD)"
        required: false
        type: string
      dry_run:
        description: "Fetch + validate only, skip DB write"
        required: false
        type: boolean
        default: false

concurrency:
  group: price-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      LOG_LEVEL: INFO
      MC_SEED: "42"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync deps
        run: uv sync --frozen

      - name: Fetch prices
        id: fetch
        run: |
          args=""
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            args="$args --dry-run"
          fi
          if [[ -n "${{ inputs.date }}" ]]; then
            args="$args --date ${{ inputs.date }}"
          fi
          uv run python scripts/fetch_prices.py $args 2>&1 | tee fetch.log

      - name: Upload fetch log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fetch-log-${{ github.run_id }}
          path: backend/fetch.log
          retention-days: 14

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = '';
            try {
              log = fs.readFileSync('backend/fetch.log', 'utf8');
              const lines = log.split('\n');
              log = lines.slice(-100).join('\n');
            } catch (e) {
              log = `(could not read backend/fetch.log: ${e.message})`;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Price update failed ${context.runId}`,
              body: [
                `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                '```',
                log,
                '```',
              ].join('\n'),
              labels: ['bug', 'price-update'],
            });
